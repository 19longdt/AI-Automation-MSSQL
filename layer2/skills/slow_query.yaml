skill_id: slow_query_v1

issue_types:
  - slow_query
  - high_variation_query

specialization: |
  Focus: slow query va high variation query.
  Neu metrics co blocking_session_id > 0: phan tich blocking context (blocker_sql_text,
  wait_type, wait_seconds, blocker_login) nhu root cause chinh truoc khi xem plan.

  Bat dau bang viec hieu query va plan:
  1. Dung get_plan_analysis(finding_id) de xem operators, warnings, partition access, spills.
  2. Dung get_query_structure(finding_id) de xem tables, joins, predicates, function calls.
  3. Dung get_table_context(table_name) cho cac bang chinh lien quan.

  Sau do moi xac nhan root cause bang DMV:
  4. get_query_store_history de xac nhan plan regression.
  5. get_query_stats de xem parameter sniffing, plan variation, spills.
  6. get_statistics_info cho bang chinh neu nghi stale statistics.
  7. get_wait_stats neu can phan biet I/O, memory, blocking, parallelism.

  Neu can recurrence context:
  8. get_analysis_history de xem finding/pattern da xuat hien truoc day chua.

user_prompt_template: |
  Phan tich finding sau:

  Issue: {issue_type} | Severity: {severity}
  Node: {node} ({role}) | Detected: {detected_at}
  Finding ID: {finding_id}
  Query Hash: {query_hash}
  Metrics:
  {metrics_json}

required_tools:
  - get_plan_analysis
  - get_query_structure
  - get_query_stats
  - get_query_store_history

optional_tools:
  - get_table_context
  - get_statistics_info
  - get_wait_stats
  - get_index_usage
  - get_missing_indexes
  - get_memory_grant
  - get_resource_governor_stats
  - get_analysis_history

model: claude-sonnet-4-6
max_tool_rounds: 8
max_tokens: 3500
max_cost_usd: 0.25
include_fields: []
