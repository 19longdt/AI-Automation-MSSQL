skill_id: index_v1

issue_types:
  - missing_index
  - index_fragmentation

specialization: |
  Focus: missing index or index fragmentation. Can recommend syntax but never execute DDL.

  Neu finding gan voi mot query cu the:
  - get_query_structure(finding_id) de biet bang, join, predicate
  - get_plan_analysis(finding_id) de xem scan, lookup, sort, hash, missing index hint
  - get_table_context(table_name) de biet bang co pattern dac biet nao khong

  Sau do xac nhan bang DMV:
  - get_index_usage va get_missing_indexes la truc chinh
  - get_index_fragmentation cho issue fragmentation
  - get_query_stats / get_query_store_history neu can impact that

user_prompt_template: |
  Phan tich finding:

  Issue: {issue_type} | Severity: {severity}
  Node: {node} ({role}) | Detected: {detected_at}
  Finding ID: {finding_id}
  Query Hash: {query_hash}
  Metrics:
  {metrics_json}

required_tools:
  - get_index_usage
  - get_missing_indexes

optional_tools:
  - get_query_structure
  - get_plan_analysis
  - get_table_context
  - get_index_fragmentation
  - get_query_stats
  - get_query_store_history
  - get_analysis_history

model: claude-haiku-4-5-20251001
max_tool_rounds: 5
max_tokens: 1500
max_cost_usd: 0.05
include_fields: []
