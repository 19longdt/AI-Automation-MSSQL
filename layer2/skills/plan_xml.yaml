skill_id: plan_xml_v1

issue_types:
  - plan_regression
  - plan_instability
  - non_optimal_index
  - partition_elimination_failure

specialization: |
  Focus: execution plan analysis, operator patterns, estimate mismatch, spills, and missing index hints.

  Luon bat dau bang get_plan_analysis(finding_id) thay vi doc raw XML.
  Dung get_query_structure(finding_id) de xac nhan bang, join, va function calls tren predicate.
  Dung get_table_context(table_name) cho bang chinh trong plan neu can context nghiep vu/index.

  Sau do moi cross-check bang DMV:
  - get_statistics_info neu plan co estimate_ratio cao hoac cardinality lech.
  - get_index_usage va get_missing_indexes neu plan cho thay scan, lookup, missing index hint.
  - get_query_store_history neu can xac nhan regression theo thoi gian.
  - get_query_stats neu can so lieu spills/cpu/reads.

user_prompt_template: |
  Phan tich execution plan:

  Issue: {issue_type} | Severity: {severity}
  Node: {node} ({role}) | Detected: {detected_at}
  Finding ID: {finding_id}
  Query Hash: {query_hash}
  Metrics:
  {metrics_json}

required_tools:
  - get_plan_analysis
  - get_query_structure

optional_tools:
  - get_table_context
  - get_statistics_info
  - get_index_usage
  - get_missing_indexes
  - get_query_store_history
  - get_query_stats
  - get_analysis_history

model: claude-sonnet-4-6
max_tool_rounds: 4
max_tokens: 2500
max_cost_usd: 0.15
include_fields: []
