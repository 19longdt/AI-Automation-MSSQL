skill_id: generic

issue_types:
  - generic

specialization: |
  Fallback skill cho issue_type chua co skill chuyen biet.

  Neu finding co lien quan query/plan, bat dau bang:
  - get_plan_analysis(finding_id)
  - get_query_structure(finding_id)
  - get_table_context(table_name) cho bang chinh

  Sau do chon DMV phu hop theo dau hieu:
  - get_wait_stats de dinh huong vung van de
  - get_query_stats de xem query ton tai nguyen
  - get_blocking_chain neu nghi lock waits
  - get_resource_governor_stats neu nghi pool pressure
  - get_tempdb_usage neu nghi spill/version store
  - get_ag_status neu issue tren secondary/replication
  - get_memory_pressure neu nghi memory pressure
  - get_cdc_status neu nghi CDC
  - get_analysis_history neu can recurrence context

user_prompt_template: |
  Phan tich finding sau:

  Issue: {issue_type} | Severity: {severity}
  Node: {node} ({role}) | Detected: {detected_at}
  Finding ID: {finding_id}
  Query Hash: {query_hash}
  Metrics:
  {metrics_json}

required_tools: []

optional_tools:
  - get_plan_analysis
  - get_query_structure
  - get_table_context
  - get_wait_stats
  - get_query_stats
  - get_blocking_chain
  - get_resource_governor_stats
  - get_recent_findings
  - get_tempdb_usage
  - get_ag_status
  - get_memory_pressure
  - get_cdc_status
  - get_analysis_history

model: claude-sonnet-4-6
max_tool_rounds: 4
max_tokens: 2000
max_cost_usd: 0.10
include_fields: []
