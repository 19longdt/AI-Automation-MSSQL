skill_id: deadlock_v1

issue_types:
  - deadlock

specialization: |
  Focus: deadlock graph, victim/survivor, lock ordering, va action ngan tai phat.

  Neu finding co query text/plan, dung:
  - get_query_structure(finding_id) de xac dinh bang va join pattern
  - get_plan_analysis(finding_id) neu co query_plan_xml
  - get_table_context(table_name) cho bang chinh tranh chap

  Sau do cross-check:
  - get_query_stats de xem tan suat va query_hash neu co
  - get_index_usage de xem scan/seek tren bang tranh chap
  - get_blocking_chain neu can current lock context
  - get_query_store_history neu deadlock gan voi plan change
  - get_analysis_history de xem pattern recurring

user_prompt_template: |
  Phan tich deadlock finding sau:

  Issue: {issue_type} | Severity: {severity}
  Node: {node} ({role}) | Detected: {detected_at}
  Finding ID: {finding_id}
  Query Hash: {query_hash}
  Metrics:
  {metrics_json}

required_tools:
  - get_query_structure
  - get_query_stats
  - get_index_usage

optional_tools:
  - get_plan_analysis
  - get_table_context
  - get_blocking_chain
  - get_query_store_history
  - get_analysis_history

model: claude-sonnet-4-6
max_tool_rounds: 4
max_tokens: 2000
max_cost_usd: 0.10
include_fields: []
