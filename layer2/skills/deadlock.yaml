skill_id: deadlock_v1

issue_types:
  - deadlock

specialization: |
  Focus: deadlock graph, victim/survivor, lock ordering, va action ngan tai phat.

  Metrics trong finding (tu Layer 1 detector): deadlock_time, victim_id, victim_query.
  LUU Y: query_hash cua deadlock finding la DEDUP HASH (md5 cua time|query),
  KHONG phai query_hash tu plan cache -> khong dung lam param cho get_query_stats;
  thay vao do dung victim_query text voi get_query_structure.

  Neu finding co query text/plan, dung:
  - get_query_structure(finding_id) de xac dinh bang va join pattern
  - get_plan_analysis(finding_id) neu co query_plan_xml
  - get_table_context(table_name) cho bang chinh tranh chap

  Sau do cross-check:
  - get_query_stats de xem tan suat va query_hash neu co
  - get_index_usage de xem scan/seek tren bang tranh chap
  - get_blocking_chain neu can current lock context
  - get_query_store_history neu deadlock gan voi plan change
  - get_analysis_history de xem pattern recurring

user_prompt_template: |
  Phan tich deadlock finding sau:

  Issue: {issue_type} | Severity: {severity}
  Node: {node} ({role}) | Detected: {detected_at}
  Finding ID: {finding_id}
  Query Hash: {query_hash}
  Metrics:
  {metrics_json}

# get_query_stats/get_index_usage chuyen sang optional: deadlock finding khong co
# query_hash that (chi co dedup hash) — bat buoc se gay tool error moi fresh analysis
required_tools:
  - get_query_structure

optional_tools:
  - get_query_stats
  - get_index_usage
  - get_plan_analysis
  - get_table_context
  - get_blocking_chain
  - get_query_store_history
  - get_analysis_history

model: claude-sonnet-4-6
max_tool_rounds: 4
max_tokens: 2000
max_cost_usd: 0.10
include_fields: []
