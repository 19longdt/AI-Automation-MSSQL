services:

  # ── Layer 1: Python Monitoring Service ──────────────────────────────────────
  # 3 chế độ build:
  #
  #   Separate (default):
  #     docker build -f Dockerfile -t ai-automation-mssql/layer1:vX .
  #     LAYER1_IMAGE=ai-automation-mssql/layer1:vX docker compose up -d layer1
  #
  #   Combined (1 image cho cả 2 layers):
  #     docker build -f Dockerfile.combined -t ai-automation-mssql:vX .
  #     LAYER1_IMAGE=ai-automation-mssql:vX LAYER2_IMAGE=ai-automation-mssql:vX docker compose up -d
  #
  #   Registry:
  #     LAYER1_IMAGE=ghcr.io/org/layer1:vX docker compose pull && docker compose up -d
  layer1:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${LAYER1_IMAGE:-ai-automation-mssql/layer1:latest}
    container_name: layer1-monitor
    restart: unless-stopped
    command: ["python", "-m", "layer1.scheduler"]

    # Đọc env vars từ file .env trong cùng thư mục
    env_file: .env

    # Override MONGODB_URI để trỏ vào service mongodb bên dưới.
    # Nếu dùng MongoDB external, bỏ dòng này và sửa MONGODB_URI trong .env.
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      # Persistent queue cho python-logstash-async — đảm bảo không mất log
      # khi Logstash hoặc container restart. Path bên trong container.
      LOGSTASH_DATABASE_PATH: /var/lib/layer1/logstash/queue.db

    volumes:
      # Mount để persistent queue survive container restart.
      - logstash_buffer:/var/lib/layer1/logstash

    depends_on:
      mongodb:
        condition: service_healthy

    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ── Layer 2: AI Analysis Agent ───────────────────────────────────────────────
  # Chạy FastAPI + Telegram bot phân tích on-demand.
  # Dùng Telegram bot token RIÊNG (L2_TELEGRAM_BOT_TOKEN) để tránh polling conflict
  # với Layer 1 bot.
  #
  # Build separate:  docker build -f Dockerfile.layer2 -t ai-automation-mssql/layer2:vX .
  # Build combined:  dùng chung LAYER2_IMAGE với layer1 (xem comment layer1 service)
  layer2:
    build:
      context: .
      dockerfile: Dockerfile.layer2
    image: ${LAYER2_IMAGE:-ai-automation-mssql/layer2:latest}
    container_name: layer2-agent
    restart: unless-stopped
    command: ["python", "-m", "layer2.main"]

    env_file: .env

    environment:
      MONGODB_URI: mongodb://mongodb:27017
      # Layer 2 dùng bot token riêng — set L2_TELEGRAM_BOT_TOKEN trong .env
      TELEGRAM_BOT_TOKEN: ${L2_TELEGRAM_BOT_TOKEN}
      LOGSTASH_DATABASE_PATH: /var/lib/layer2/logstash/queue.db

    volumes:
      - logstash_buffer_l2:/var/lib/layer2/logstash

    ports:
      - "8000:8000"

    depends_on:
      mongodb:
        condition: service_healthy

    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ── MongoDB Community ────────────────────────────────────────────────────────
  # Bỏ service này nếu dùng MongoDB external (Atlas, replica set riêng...).
  # Khi đó sửa MONGODB_URI trong .env thành URI của MongoDB external.
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    restart: unless-stopped

    volumes:
      - mongodb_data:/data/db

    ports:
      - "27017:27017"

    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping').ok", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  mongodb_data:
    driver: local
  logstash_buffer:
    driver: local
  logstash_buffer_l2:
    driver: local
