services:

  # ── Layer 1: Python Monitoring Service ──────────────────────────────────────
  # 3 chế độ build:
  #
  #   Separate (default):
  #     docker build -f Dockerfile -t 19longdt/ai-automation-mssql-layer1:vX .
  #     LAYER1_IMAGE=19longdt/ai-automation-mssql-layer1:vX docker compose up -d layer1
  #
  #   Combined (1 image cho cả 2 layers):
  #     docker build -f Dockerfile.combined -t 19longdt/ai-automation-mssql:vX .
  #     LAYER1_IMAGE=19longdt/ai-automation-mssql:vX LAYER2_IMAGE=19longdt/ai-automation-mssql:vX docker compose up -d
  #
  #   Registry pull (không cần source):
  #     LAYER1_IMAGE=19longdt/ai-automation-mssql-layer1:vX docker compose pull && docker compose up -d
  layer1:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${LAYER1_IMAGE:-19longdt/ai-automation-mssql-layer1:latest}
    container_name: layer1-monitor
    restart: unless-stopped
    command: ["python", "-m", "layer1.scheduler"]

    # Đọc env vars từ file .env trong cùng thư mục
    env_file: .env

    # Override MONGODB_URI để trỏ vào service mongodb bên dưới.
    # Nếu dùng MongoDB external, bỏ dòng này và sửa MONGODB_URI trong .env.
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      # Persistent queue cho python-logstash-async — đảm bảo không mất log
      # khi Logstash hoặc container restart. Path bên trong container.
      LOGSTASH_DATABASE_PATH: /var/lib/layer1/logstash/queue.db

    volumes:
      # Mount để persistent queue survive container restart.
      - logstash_buffer:/var/lib/layer1/logstash

    depends_on:
      mongodb:
        condition: service_healthy

    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ── Maintenance: Index/Statistics Maintenance Runner ────────────────────────
  # PROCESS RIÊNG cùng image với layer1 — entry point khác.
  # Stop độc lập khi cần: docker compose stop maintenance (monitoring không ảnh hưởng).
  # SIGTERM → PAUSE resumable rebuild đang chạy trước khi exit.
  #
  # Trước lần chạy đầu: seed config
  #   docker compose run --rm maintenance python -m maintenance.seed.seed_maintenance
  #
  # MAINT_DRY_RUN=true (default) — chỉ log statement. Set false trong .env khi go-live.
  maintenance:
    image: ${MAINTENANCE_IMAGE:-19longdt/ai-automation-mssql-maintenance:latest}
    container_name: layer1-maintenance
    restart: unless-stopped
    command: ["python", "-m", "maintenance.runner"]

    env_file: .env

    environment:
      MONGODB_URI: mongodb://mongodb:27017

    # Grace period đủ để PAUSE resumable rebuild khi stop
    stop_grace_period: 30s

    depends_on:
      mongodb:
        condition: service_healthy

    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ── Layer 2: AI Analysis Agent ───────────────────────────────────────────────
  # Chạy FastAPI + Telegram bot phân tích on-demand.
  # Dùng Telegram bot token RIÊNG (L2_TELEGRAM_BOT_TOKEN) để tránh polling conflict
  # với Layer 1 bot.
  #
  # Build separate:  docker build -f Dockerfile.layer2 -t 19longdt/ai-automation-mssql-layer2:vX .
  # Build combined:  dùng chung LAYER2_IMAGE với layer1 (xem comment layer1 service)
  layer2:
    build:
      context: .
      dockerfile: Dockerfile.layer2
    image: ${LAYER2_IMAGE:-19longdt/ai-automation-mssql-layer2:latest}
    container_name: layer2-agent
    restart: unless-stopped
    command: ["python", "-m", "layer2.main"]

    env_file: .env

    environment:
      MONGODB_URI: mongodb://mongodb:27017
      # Layer 2 dùng bot token riêng — set L2_TELEGRAM_BOT_TOKEN trong .env
      TELEGRAM_BOT_TOKEN: ${L2_TELEGRAM_BOT_TOKEN}
      LOGSTASH_DATABASE_PATH: /var/lib/layer2/logstash/queue.db

    volumes:
      - logstash_buffer_l2:/var/lib/layer2/logstash

    ports:
      - "8000:8000"

    depends_on:
      mongodb:
        condition: service_healthy

    # /health kiểm tra MongoDB + MSSQL — MSSQL timeout mặc định 30s → timeout phải > 30s.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 35s
      retries: 3
      start_period: 30s

    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ── MongoDB Community ────────────────────────────────────────────────────────
  # Bỏ service này nếu dùng MongoDB external (Atlas, replica set riêng...).
  # Khi đó sửa MONGODB_URI trong .env thành URI của MongoDB external.
  # Layer 3: Web dashboard + API
  #
  # Build separate:
  #   docker build -f layer3/Dockerfile -t 19longdt/ai-automation-mssql-layer3:vX layer3
  #   LAYER3_IMAGE=19longdt/ai-automation-mssql-layer3:vX docker compose up -d layer3
  layer3:
    build:
      context: ./layer3
      dockerfile: Dockerfile
    image: ${LAYER3_IMAGE:-19longdt/ai-automation-mssql-layer3:latest}
    container_name: layer3-dashboard
    restart: unless-stopped

    env_file: .env

    environment:
      MONGODB_URI: mongodb://mongodb:27017
      L2_API_URL: http://layer2:8000
      API_PORT: 3000

    ports:
      - "3000:3000"

    depends_on:
      mongodb:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  mongodb:
    image: mongo:7.0
    container_name: mongodb
    restart: unless-stopped

    volumes:
      - mongodb_data:/data/db

    ports:
      - "27017:27017"

    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping').ok", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  mongodb_data:
    driver: local
  logstash_buffer:
    driver: local
  logstash_buffer_l2:
    driver: local
