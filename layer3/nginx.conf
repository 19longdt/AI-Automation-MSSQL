server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    # App entry points
    location = / {
        try_files /examples/index.html =404;
    }

    location /history {
        try_files /examples/index.html =404;
    }

    location /extract-query-plan {
        try_files /examples/index.html =404;
    }

    # Static assets
    location / {
        try_files $uri $uri/ =404;
    }
}
