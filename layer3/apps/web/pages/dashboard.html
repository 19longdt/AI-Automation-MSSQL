<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Layer3 Dashboard</title>
  <script>
    (function () {
      var key = "layer3-theme";
      var saved = localStorage.getItem(key);
      var isDark = saved ? saved === "dark" : window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      document.documentElement.setAttribute("data-theme", isDark ? "dark" : "light");
      document.documentElement.style.colorScheme = isDark ? "dark" : "light";
    })();
  </script>
  <link rel="stylesheet" href="/apps/web/css/vendor/bootstrap-reboot.min.css" />
  <link rel="stylesheet" href="/apps/web/css/vendor/bootstrap-utilities.min.css" />  
  <link rel="stylesheet" href="/apps/web/css/base.css" />
  <link rel="stylesheet" href="/apps/web/css/stats-cards.css" />
  <link rel="stylesheet" href="/apps/web/css/dashboard.css" />
  <link rel="stylesheet" type="text/css" href="/css/qp.css" />
</head>
<body data-active-tab="dashboard">
  <div id="topbarMount"></div>

  <main class="page">
    <section class="panel">
      <div class="panel-head">
        <h2>Findings</h2>
        <div class="filters">
          <input id="findingIdFilter" placeholder="Finding ID" />
          <input id="detectedFromFilter" type="datetime-local" step="1" title="Detected from" />
          <input id="detectedToFilter" type="datetime-local" step="1" title="Detected to" />
          <select id="severityFilter">
            <option value="">All severity</option>
            <option>CRITICAL</option>
            <option>WARNING</option>
            <option>INFO</option>
          </select>
          <select id="alertStatusFilter">
            <option value="">All alert status</option>
            <option value="sent">sent</option>
            <option value="suppressed">suppressed</option>
          </select>
          <select id="blockingStatusFilter" class="slow-filter hidden">
            <option value="">All blocking</option>
            <option value="blocked">Blocking</option>
            <option value="not_blocked">Not blocking</option>
          </select>
          <button id="reloadBtn" type="button">Search</button>
          <button id="clearFiltersBtn" type="button">Clear</button>
        </div>
      </div>

      <div class="findings-toolbar d-flex align-items-center justify-content-between flex-wrap gap-2 my-2">
        <div id="topicTabs" class="topic-tabs flex-grow-1"></div>
        <section class="stats-cards">
          <div class="stats-card"><div class="stats-card-label">CRITICAL</div><div id="criticalCount" class="stats-card-value">-</div></div>
          <div class="stats-card"><div class="stats-card-label">WARNING</div><div id="warningCount" class="stats-card-value">-</div></div>
          <div class="stats-card"><div class="stats-card-label">INFO</div><div id="infoCount" class="stats-card-value">-</div></div>
        </section>
      </div>
      <div id="findingsError" class="error"></div>

      <table>
        <thead><tr id="findingsHeadRow"><th class="no-cell">No</th><th>Time</th><th>Issue</th><th>Status</th><th>Node</th><th>Severity</th><th></th></tr></thead>
        <tbody id="findingsBody"></tbody>
      </table>
      <div class="pager">
        <button id="prevBtn" type="button">Prev</button>
        <span id="pageInfo">Page 1</span>
        <button id="nextBtn" type="button">Next</button>
      </div>
    </section>
  </main>

  <div id="modal" class="modal hidden">
    <div class="modal-backdrop" data-close="1"></div>
    <div class="modal-panel">
      <div class="modal-head"><strong id="modalTitle" class="modal-title">Detail</strong><button id="modalClose" class="modal-close-btn" type="button" aria-label="Close dialog">Close</button></div>
      <div id="modalBody" class="modal-body"></div>
    </div>
  </div>

  <script src="/dist/qp.js"></script>
  <script src="/dist/dashboard.js"></script>
  <script src="/apps/web/pages/topbar.js"></script>
</body>
</html>
