<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Layer3 Query Plan</title>
  <script>
    (function () {
      var key = "layer3-theme";
      var saved = localStorage.getItem(key);
      var isDark = saved ? saved === "dark" : window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      document.documentElement.setAttribute("data-theme", isDark ? "dark" : "light");
      document.documentElement.style.colorScheme = isDark ? "dark" : "light";
    })();
  </script>
  <link rel="stylesheet" href="/apps/web/css/vendor/bootstrap-reboot.min.css" />
  <link rel="stylesheet" href="/apps/web/css/vendor/bootstrap-utilities.min.css" />  
  <link rel="stylesheet" href="/apps/web/css/base.css" />
  <link rel="stylesheet" href="/apps/web/css/query-plan.css" />
  <link rel="stylesheet" type="text/css" href="/css/qp.css" />
  <script src="/dist/qp.js"></script>
</head>
<body data-active-tab="query-plan">
  <div id="topbarMount"></div>

  <main class="page qp-page">
    <section class="panel qp-panel">
      <div class="controls">
        <input type="file" id="upload" />
        <button type="button" id="openXmlModal">Paste XML</button>
        <button type="button" id="clearXml">Clear</button>
        <span class="muted">Editor má»Ÿ trong popup, khÃ´ng chiáº¿m layout chÃ­nh</span>
      </div>

      <div id="errorBanner" class="error-banner"></div>
      <div class="qp-diagram-scroll"><div id="container"></div></div>
    </section>
  </main>

  <div id="globalLoadingOverlay" class="global-loading-overlay">
    <div id="globalLoadingText" class="global-loading-box">Äang xá»­ lÃ½...</div>
  </div>

  <div class="xml-modal-backdrop" id="xmlModalBackdrop">
    <div class="xml-modal" role="dialog" aria-modal="true" aria-labelledby="xmlModalTitle">
      <div class="xml-modal-header">
        <strong id="xmlModalTitle" class="modal-title">Paste ShowPlan XML</strong>
        <button type="button" id="closeXmlModal" class="modal-close-btn" aria-label="Close dialog">Close</button>
      </div>
      <div class="xml-modal-body">
        <textarea id="xmlInput" placeholder="Paste ShowPlan XML here..."></textarea>
        <div class="xml-modal-actions">
          <button type="button" id="renderNow">Render now</button>
          <span class="muted">Auto render sau 2 giÃ¢y</span>
        </div>
      </div>
    </div>
  </div>

  <div class="xml-modal-backdrop" id="xmlViewerBackdrop">
    <div class="xml-modal" role="dialog" aria-modal="true" aria-labelledby="xmlViewerTitle">
      <div class="xml-modal-header">
        <strong id="xmlViewerTitle" class="modal-title">Formatted ShowPlan XML</strong>
        <button type="button" id="closeXmlViewer" class="modal-close-btn" aria-label="Close dialog">Close</button>
      </div>
      <div class="xml-modal-body">
        <div class="xml-viewer-grid">
          <div class="xml-viewer-section">
            <div class="xml-viewer-toolbar">
              <button type="button" id="expandAllXml">Expand all</button>
              <button type="button" id="collapseAllXml">Collapse all</button>
            </div>
            <div id="xmlViewerContent" class="xml-viewer-content"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="xml-modal-backdrop" id="beautifyViewerBackdrop">
    <div class="xml-modal" role="dialog" aria-modal="true" aria-labelledby="beautifyViewerTitle">
      <div class="xml-modal-header">
        <strong id="beautifyViewerTitle" class="modal-title">Beautified Query</strong>
        <button type="button" id="closeBeautifyViewer" class="modal-close-btn" aria-label="Close dialog">Close</button>
      </div>
      <div class="xml-modal-body">
        <div id="beautifyViewerContent" class="xml-viewer-content"></div>
      </div>
    </div>
  </div>

  <script>
    var renderTimeoutId = null;
    var xmlModalBackdrop = document.getElementById('xmlModalBackdrop');
    var xmlInput = document.getElementById('xmlInput');
    var xmlViewerBackdrop = document.getElementById('xmlViewerBackdrop');
    var xmlViewerContent = document.getElementById('xmlViewerContent');
    var beautifyViewerBackdrop = document.getElementById('beautifyViewerBackdrop');
    var beautifyViewerContent = document.getElementById('beautifyViewerContent');
    var globalLoadingOverlay = document.getElementById('globalLoadingOverlay');
    var globalLoadingText = document.getElementById('globalLoadingText');
    var errorBanner = document.getElementById('errorBanner');

    var currentXmlText = '';
    var planData = null;
    var isRendering = false;
    var actionLoadingCount = 0;

    function applyHeatColoring(container) {
      var nodes = container.querySelectorAll('.qp-node[data-elapsed-ms]');
      if (!nodes.length) return;
      var maxMs = 0;
      nodes.forEach(function (n) {
        var ms = parseInt(n.getAttribute('data-elapsed-ms'), 10) || 0;
        if (ms > maxMs) maxMs = ms;
      });
      if (!maxMs) return;
      nodes.forEach(function (n) {
        var ms = parseInt(n.getAttribute('data-elapsed-ms'), 10) || 0;
        var pct = ms / maxMs;
        var heat = pct >= 0.75 ? 'critical' : pct >= 0.4 ? 'high' : pct >= 0.15 ? 'medium' : 'low';
        n.setAttribute('data-heat', heat);
      });
    }

    function beginActionLoading(message) {
      actionLoadingCount += 1;
      globalLoadingText.textContent = message || 'Äang xá»­ lÃ½...';
      globalLoadingOverlay.classList.add('show');
    }
    function endActionLoading() {
      actionLoadingCount = Math.max(0, actionLoadingCount - 1);
      if (actionLoadingCount === 0) globalLoadingOverlay.classList.remove('show');
    }
    function runWithActionLoading(message, fn) {
      beginActionLoading(message);
      setTimeout(function () {
        try { fn(); } finally { setTimeout(endActionLoading, 120); }
      }, 0);
    }
    function showError(message) { errorBanner.textContent = message; errorBanner.classList.add('show'); }
    function clearError() { errorBanner.textContent = ''; errorBanner.classList.remove('show'); }
    function savePlanData(xmlText, source) {
      var rawXml = String(xmlText || '');
      planData = { source: source || 'unknown', rawXml: rawXml, formattedXml: rawXml, updatedAt: new Date().toISOString() };
    }
    function parseXmlOrThrow(xmlText) {
      var doc = new DOMParser().parseFromString(xmlText, 'application/xml');
      if (doc.getElementsByTagName('parsererror').length > 0) throw new Error('XML parse error.');
      return doc;
    }
    function renderPlan(xmlText) {
      if (!xmlText || !xmlText.trim()) return;
      clearError();
      isRendering = true;
      beginActionLoading('Äang parse XML vÃ  render diagram...');
      currentXmlText = xmlText;
      setTimeout(function () {
        try {
          parseXmlOrThrow(xmlText);
          QP.showPlan(document.getElementById('container'), xmlText);
          applyHeatColoring(document.getElementById('container'));
        } catch (err) {
          showError('KhÃ´ng thá»ƒ render plan. Vui lÃ²ng kiá»ƒm tra XML.\n' + (err && err.message ? err.message : 'Unknown error'));
        } finally {
          isRendering = false;
          endActionLoading();
        }
      }, 0);
    }
    function scheduleRender(xmlText) {
      if (renderTimeoutId != null) clearTimeout(renderTimeoutId);
      renderTimeoutId = setTimeout(function () { renderPlan(xmlText); closeXmlModal(); }, 2000);
    }
    function openXmlModal() { xmlModalBackdrop.classList.add('open'); xmlInput.focus(); }
    function closeXmlModal() { xmlModalBackdrop.classList.remove('open'); }
    function closeXmlViewer() { xmlViewerBackdrop.classList.remove('open'); }
    function closeBeautifyViewer() { beautifyViewerBackdrop.classList.remove('open'); }
    function buildXmlTreeHtml(xmlText) {
      if (window.QP && typeof window.QP.buildXmlTreeHtml === 'function') {
        return window.QP.buildXmlTreeHtml(xmlText);
      }
      return '<div class="xml-text">Cannot parse XML.</div>';
    }
    function getCurrentPlanXmlText() {
      return (planData && planData.rawXml) || ((xmlInput.value && xmlInput.value.trim()) ? xmlInput.value : currentXmlText) || '';
    }
    function copyTextToClipboardWithFallback(text) {
      var nav = navigator;
      if (nav && nav.clipboard && typeof nav.clipboard.writeText === 'function') {
        nav.clipboard.writeText(String(text || '')).catch(function () { fallbackCopyText(String(text || '')); });
        return;
      }
      fallbackCopyText(String(text || ''));
    }
    function fallbackCopyText(text) {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.setAttribute('readonly', 'readonly');
      ta.style.position = 'fixed';
      ta.style.top = '-10000px';
      ta.style.left = '-10000px';
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); } catch (_e) {}
      document.body.removeChild(ta);
    }
    function setTreeExpanded(expanded) {
      var nodes = xmlViewerContent.querySelectorAll('details');
      for (var i = 0; i < nodes.length; i++) nodes[i].open = expanded;
    }
    function openXmlViewer() {
      var sourceXml = (planData && planData.rawXml) || ((xmlInput.value && xmlInput.value.trim()) ? xmlInput.value : currentXmlText);
      if (!sourceXml || !sourceXml.trim()) {
        showError('Khong co XML de hien thi. Hay upload hoac paste XML truoc.');
        return;
      }
      if (!planData || planData.rawXml !== sourceXml) savePlanData(sourceXml, 'viewer');
      currentXmlText = sourceXml;
      runWithActionLoading('Dang chuan bi ShowPlan XML...', function () {
        xmlViewerContent.classList.add('tree');
        xmlViewerContent.innerHTML = buildXmlTreeHtml(planData.rawXml);
        xmlViewerBackdrop.classList.add('open');
        setTreeExpanded(true);
      });
    }
    function openQueryPopup(queryText) {
      var raw = String(queryText || '');
      var qpObj = window.QP || null;
      document.getElementById('beautifyViewerTitle').textContent = 'Query Detail';
      beautifyViewerContent.innerHTML = '<pre style="margin:0;white-space:pre-wrap;word-break:break-word">Formatting...</pre>';
      beautifyViewerBackdrop.classList.add('open');

      if (qpObj && typeof qpObj.beautifySqlWithFallback === 'function') {
        qpObj.beautifySqlWithFallback(raw).then(function (formatted) {
          beautifyViewerContent.innerHTML = '<pre style="margin:0;white-space:pre-wrap;word-break:break-word">' +
            String(formatted || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') +
            '</pre>';
        }).catch(function () {
          beautifyViewerContent.innerHTML = '<pre style="margin:0;white-space:pre-wrap;word-break:break-word">' +
            raw.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') +
            '</pre>';
        });
        return;
      }

      beautifyViewerContent.innerHTML = '<pre style="margin:0;white-space:pre-wrap;word-break:break-word">' +
        raw.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') +
        '</pre>';
    }

    document.getElementById('openXmlModal').addEventListener('click', openXmlModal);
    document.getElementById('closeXmlModal').addEventListener('click', closeXmlModal);
    document.getElementById('closeXmlViewer').addEventListener('click', closeXmlViewer);
    document.getElementById('closeBeautifyViewer').addEventListener('click', closeBeautifyViewer);
    document.getElementById('expandAllXml').addEventListener('click', function () { setTreeExpanded(true); });
    document.getElementById('collapseAllXml').addEventListener('click', function () { setTreeExpanded(false); });
    document.getElementById('renderNow').addEventListener('click', function () { savePlanData(xmlInput.value, 'paste'); renderPlan(xmlInput.value); closeXmlModal(); });
    document.getElementById('clearXml').addEventListener('click', function () {
      if (isRendering) return;
      xmlInput.value = '';
      currentXmlText = '';
      planData = null;
      clearError();
      document.getElementById('container').innerHTML = '';
    });
    xmlModalBackdrop.addEventListener('click', function (e) { if (e.target === xmlModalBackdrop) closeXmlModal(); });
    xmlViewerBackdrop.addEventListener('click', function (e) { if (e.target === xmlViewerBackdrop) closeXmlViewer(); });
    beautifyViewerBackdrop.addEventListener('click', function (e) { if (e.target === beautifyViewerBackdrop) closeBeautifyViewer(); });
    document.addEventListener('keydown', function (e) { if (e.key === 'Escape') { closeXmlModal(); closeXmlViewer(); closeBeautifyViewer(); } });
    xmlInput.addEventListener('input', function (e) { clearError(); savePlanData(e.target.value, 'paste'); scheduleRender(e.target.value); });
    document.getElementById('container').addEventListener('click', function (e) {
      var target = e.target;
      if (target && target.classList && target.classList.contains('qp-query-tab') && target.getAttribute('data-tab')) {
        runWithActionLoading('Dang tai noi dung query...', function () {});
      }
    });
    if (window.QP && typeof window.QP.bindQueryActions === 'function') {
      window.QP.bindQueryActions(document.getElementById('container'), {
        onOpenQueryPopup: function (ctx) {
          openQueryPopup(ctx && ctx.queryText ? ctx.queryText : '');
        },
        onShowPlanXml: function () {
          document.getElementById('xmlViewerTitle').textContent = 'Formatted ShowPlan XML';
          openXmlViewer();
        },
        onCopyPlanXml: function () {
          copyTextToClipboardWithFallback(getCurrentPlanXmlText());
        },
        onBeautify: function (ctx) {
          if (window.QP && typeof window.QP.applyBeautifyToBlock === 'function' && ctx && ctx.block) {
            window.QP.applyBeautifyToBlock(ctx.block);
          }
        }
      });
    }
    document.getElementById('upload').addEventListener('change', function (e) {
      var file = e.target.files[0];
      if (!file) return;
      var reader = new FileReader();
      reader.onload = function (evt) {
        var xmlText = evt.target.result;
        xmlInput.value = xmlText;
        savePlanData(xmlText, 'file');
        renderPlan(xmlText);
      };
      reader.onerror = function () { showError('KhÃ´ng thá»ƒ Ä‘á»c file XML. Vui lÃ²ng thá»­ láº¡i.'); };
      reader.readAsText(file, 'UTF-8');
    });
  </script>
  <script src="/apps/web/pages/topbar.js"></script>
</body>
</html>
