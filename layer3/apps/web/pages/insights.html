<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Layer3 Insights</title>
  <link rel="stylesheet" href="/apps/web/css/vendor/bootstrap-reboot.min.css" />
  <link rel="stylesheet" href="/apps/web/css/vendor/bootstrap-utilities.min.css" />
  <link rel="stylesheet" href="/apps/web/css/base.css" />
</head>
<body>
  <div class="topbar">
    <a href="/dashboard" class="tab">Dashboard</a>
    <a href="/insights" class="tab active">Insights</a>
    <a href="/query-plan" class="tab">Query Plan</a>
  </div>

  <main class="page">
    <section class="panel">
      <div class="panel-head">
        <h2>Insights</h2>
        <button id="reloadInsights" type="button">Reload</button>
      </div>
      <div id="insightsError" class="error"></div>
      <table>
        <thead><tr><th class="no-cell">No</th><th>Root Cause</th><th>Tables</th><th>Created</th><th></th></tr></thead>
        <tbody id="insightsBody"></tbody>
      </table>
    </section>
  </main>

  <div id="modal" class="modal hidden">
    <div class="modal-backdrop" data-close="1"></div>
    <div class="modal-panel">
      <div class="modal-head"><strong id="modalTitle" class="modal-title">Insight Detail</strong><button id="modalClose" class="modal-close-btn" type="button" aria-label="Close dialog">Close</button></div>
      <div id="modalBody" class="modal-body"></div>
    </div>
  </div>

  <script src="/dist/insights.js"></script>
</body>
</html>
